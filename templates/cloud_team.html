 <!DOCTYPE html>
 <html lang="zh-CN">
 <head>
   <meta charset="UTF-8" />
   <meta name="viewport" content="width=device-width, initial-scale=1.0" />
   <link rel="icon" href="{{ url_for('static', filename='单位.jpg') }}">
   <title>异环云配队 - 主界面</title>
<link rel="stylesheet" href="{{ url_for('static', filename='cloud/cloud.css') }}?v=41" />
   <script src="{{ url_for('static', filename='vendor/xlsx.full.min.js') }}"></script>
   <script src="{{ url_for('static', filename='vendor/hyperformula.full.min.js') }}"></script>
   <script src="{{ url_for('static', filename='vendor/echarts.min.js') }}"></script>
 </head>
 <body>
   <div class="page">
     <div class="topbar">
       <h1>异环云配队</h1>
       <div class="nav">
        <a class="gh-link" href="https://github.com/AmicBeam/nte_quick_team_up" target="_blank" rel="noreferrer" aria-label="GitHub">
          <svg viewBox="0 0 16 16" aria-hidden="true" fill="currentColor">
            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8Z"></path>
          </svg>
        </a>
        <a class="btn secondary" href="#gear" id="navGear">配装</a>
        <a class="btn secondary" href="#main" id="navMain" style="display:none">主界面</a>
         <a class="btn secondary" href="/preteam">预配队</a>
       </div>
     </div>
 
    <div id="mainPanel" class="layout">
      <div class="glass stack">
        <div>
          <div class="section-title">其他配置</div>
          <div class="stack" id="misc"></div>
        </div>

        <div>
          <div class="section-title">导入导出</div>
          <div class="stack">
            <button class="btn" id="exportBtn">导出JSON</button>
            <button class="btn secondary" id="importBtn">导入JSON</button>
            <textarea id="jsonBox" placeholder="这里会显示导出的JSON，也可以粘贴JSON后点击导入"></textarea>
          </div>
        </div>

        <div class="hint" id="statusText">正在加载表格…</div>
      </div>

      <div class="stack">
        <div class="glass">
          <div class="section-header axis-header">
            <div class="section-title">动作轴</div>
            <div class="op-hint">左键拖动/缩放，右键编辑/新增</div>
          </div>
          <div id="actionArea"></div>
          <div style="height: 14px"></div>
          <div id="configArea"></div>
          <div style="height: 14px"></div>
          <div id="buffArea"></div>
        </div>
      </div>
 
      <div class="glass">
        <div class="section-title">结果区</div>
         <div class="kpi">
           <div class="card">
             <div class="label">DPS</div>
             <div class="num" id="dpsValue">—</div>
           </div>
           <div class="card">
             <div class="label">总伤害</div>
             <div class="num" id="totalDamage">—</div>
           </div>
         </div>
        <div id="roleContribList" style="margin-top: 10px"></div>
        <div id="chart" class="chart"></div>
        <div id="actionShareChart" class="chart chart-sm"></div>
         <div class="hint" id="traceBox"></div>
       </div>
     </div>

    <div id="gearPanel" style="display:none">
      <div class="glass">
        <div class="section-title">角色配装</div>
        <div style="overflow-x:auto">
          <table class="table gear-table" id="gearTable"></table>
        </div>
        <div class="hint" id="gearStatus">正在加载表格…</div>
      </div>
    </div>
   </div>
 
  <div id="picker" class="picker" style="display:none"></div>
 
  <script type="module" src="{{ url_for('static', filename='cloud/cloudTeamPage.js') }}?v=40"></script>
 </body>
 </html>
